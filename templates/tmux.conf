# loomo private tmux server — intentionally independent from ~/.tmux.conf
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g default-terminal "tmux-256color"
# Advertise 24-bit color so the claude/codex TUI's text styles aren't downgraded
# to 256 colors inside tmux — some RGB colors otherwise collapse to black/wrong.
set -as terminal-features ",*:RGB"
set -g focus-events on
set -g allow-passthrough on
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY LANG LC_ALL LC_CTYPE"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# A pane-local @loomo_role is stable even when an AI changes its terminal title.
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[bold]#[fg=colour39],#[fg=colour244]}#{?#{@loomo_role},#{@loomo_role},#{pane_title}} #[default]"
set -g pane-active-border-style "fg=colour39"
set -g pane-border-style "fg=colour238"
set -g allow-set-title off

# Rebuild the pane context-menu binding with installed loomo skills. The
# resulting binding calls display-menu directly, so it behaves like tmux's
# built-in menu and remains open after the mouse button is released.
run-shell 'loomo skill refresh-menu'

set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[bg=colour39,fg=colour232,bold] #S #[default] "
set -g status-left-length 30
set -g status-right "%m/%d %H:%M"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind m swap-pane -t 1

# Always select the pane under the pointer, including after scrolling/copy mode.
bind -T copy-mode MouseDown1Pane select-pane -t =
bind -T copy-mode-vi MouseDown1Pane select-pane -t =
bind -T copy-mode MouseUp1Pane if -F '#{selection_present}' 'send-keys -X clear-selection' 'send-keys -X cancel'
bind -T copy-mode-vi MouseUp1Pane if -F '#{selection_present}' 'send-keys -X clear-selection' 'send-keys -X cancel'

# Portable clipboard integration: enable only when the platform command exists.
# copy-pipe-and-cancel (tmux's default) copies AND leaves copy-mode on release,
# so a drag needs no extra "throwaway" click before you can type again.
if-shell 'command -v pbcopy >/dev/null 2>&1' 'bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"'
if-shell 'command -v pbcopy >/dev/null 2>&1' 'bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"'
